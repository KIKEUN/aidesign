<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>경품추첨 시스템</title>
<style>
  :root {
    --ink: #17233f;
    --muted: #5c6b8a;
    --navy: #1f3f7a;
    --blue: #2f6df0;
    --amber: #f5a623;
    --amber-deep: #dd8409;
    --card: rgba(255,255,255,.74);
    --line: rgba(31,63,122,.14);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: "Pretendard", "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1100px 680px at 12% -12%, #e9f0ff, transparent 60%),
      radial-gradient(1000px 700px at 108% 4%, #fff2dc, transparent 55%),
      linear-gradient(160deg, #f7faff 0%, #eef3fb 55%, #f5f8fd 100%);
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* ===== 배경 : 블루프린트 그리드 + 도심 스카이라인 ===== */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  /* 청사진 그리드 (가는선 + 굵은선) */
  .bg .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(31,63,122,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,63,122,.05) 1px, transparent 1px),
      linear-gradient(rgba(31,63,122,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,63,122,.10) 1px, transparent 1px);
    background-size: 32px 32px, 32px 32px, 160px 160px, 160px 160px;
    -webkit-mask-image: radial-gradient(125% 95% at 50% 26%, #000 52%, transparent 100%);
    mask-image: radial-gradient(125% 95% at 50% 26%, #000 52%, transparent 100%);
  }
  /* 화려한 소프트 글로우 */
  .bg .glow { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .5;
    animation: float 18s ease-in-out infinite; }
  .bg .g1 { width: 42vw; height: 42vw; right: -8vw; top: -10vw;
    background: radial-gradient(circle, #ffd27a, transparent 62%); }
  .bg .g2 { width: 40vw; height: 40vw; left: -10vw; bottom: -4vw;
    background: radial-gradient(circle, #9cc0ff, transparent 62%); animation-delay: -6s; }
  .bg .g3 { width: 26vw; height: 26vw; left: 44vw; top: 26vh;
    background: radial-gradient(circle, #ffb3d1, transparent 62%); opacity:.32; animation-delay: -11s; }
  @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-2vw,3vh) scale(1.08)} }
  /* 도심 스카이라인 + 타워크레인 */
  .bg .skyline { position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: min(44vh, 440px); }
  .bg .skyline .far  { fill: rgba(31,63,122,.075); }
  .bg .skyline .near { fill: rgba(31,63,122,.135); }
  .bg .skyline .crane{ stroke: rgba(31,63,122,.32); stroke-width: 3; fill: none; stroke-linejoin: round; }
  .bg .skyline .amber{ fill: var(--amber); opacity: .85; }

  #stars, #confetti { position: fixed; inset: 0; pointer-events: none; }
  #stars { z-index: 1; }
  #confetti { z-index: 40; }

  /* ===== 레이아웃 ===== */
  .wrap {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(22px, 4vh, 42px);
    max-width: 520px; margin: 0 auto;
    padding: clamp(28px, 5vw, 56px);
    text-align: center;
  }

  /* ===== 왼쪽 소개 ===== */
  .badge {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(52,230,224,.10); border: 1px solid rgba(52,230,224,.35);
    color: #b9fff9; font-size: 12px; font-weight: 700; letter-spacing: .28em;
  }
  .badge i {
    width: 8px; height: 8px; border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan); animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .title {
    white-space: nowrap;
    font-size: clamp(46px, 9vw, 92px); font-weight: 900; line-height: 1.02;
    letter-spacing: .04em;
    background: linear-gradient(120deg, #1f3f7a 0%, #2f6df0 48%, #f5a623 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 12px 34px rgba(31,63,122,.16);
  }
  .desc {
    max-width: 460px; color: var(--muted);
    font-size: clamp(14px, 1.6vw, 17px); line-height: 1.85; font-weight: 500;
  }
  @media (max-width: 900px) { .desc { margin: 0 auto; } }

  .stats { display: flex; gap: 12px; margin-top: 30px; }
  @media (max-width: 900px) { .stats { justify-content: center; } }
  .stat {
    flex: 1; max-width: 150px;
    padding: 16px 18px; border-radius: 16px;
    background: var(--card); border: 1px solid var(--line);
    backdrop-filter: blur(8px);
    text-align: left;
  }
  @media (max-width: 900px) { .stat { text-align: center; } }
  .stat .k { font-size: 11px; letter-spacing: .18em; color: var(--muted); font-weight: 700; }
  .stat .v { margin-top: 8px; font-size: 22px; font-weight: 800; color: #fff; }
  .stat .v.on { color: var(--cyan); }

  /* ===== 오른쪽 콘솔 카드 ===== */
  .console {
    position: relative;
    width: 100%;
    padding: clamp(26px, 3vw, 40px);
    border-radius: 30px;
    background: linear-gradient(170deg, rgba(255,255,255,.88), rgba(255,255,255,.66));
    border: 1px solid rgba(31,63,122,.12);
    box-shadow: 0 30px 70px rgba(31,63,122,.18), inset 0 1px 0 rgba(255,255,255,.9);
    backdrop-filter: blur(14px);
    text-align: center;
    overflow: hidden;
  }
  .console::before {   /* 상단 라인 하이라이트 */
    content: ''; position: absolute; inset: 0 0 auto 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--amber), transparent);
  }
  .console-label {
    font-size: 13px; letter-spacing: .42em; font-weight: 800; color: #7385ad;
  }

  /* 번호 보드 */
  .board {
    position: relative;
    width: min(320px, 78vw); height: 230px; margin: 24px auto 22px;
    border-radius: 26px;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(47,109,240,.10), transparent 60%),
      linear-gradient(180deg, #ffffff, #eef3fb);
    border: 1px solid rgba(31,63,122,.12);
    box-shadow: inset 0 2px 14px rgba(31,63,122,.10), 0 8px 22px rgba(31,63,122,.08);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* 회전 로딩 링 (추첨 중일 때만) */
  .board .ring {
    position: absolute; inset: -2px; border-radius: 24px; padding: 2px;
    background: conic-gradient(from 0deg, transparent 0 70%, var(--blue) 85%, var(--amber) 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity .3s;
  }
  .console.drawing .board .ring { opacity: 1; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 스캔라인 */
  .board::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(31,63,122,.03) 0 1px, transparent 1px 5px);
  }
  .draw { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .num {
    font-size: clamp(38px, 7.4vw, 58px); font-weight: 900; line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: .04em;
    background: linear-gradient(180deg, #1f3f7a, #2f6df0 55%, #f5a623);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 2px 14px rgba(47,109,240,.18);
    transition: transform .25s ease;
  }
  .pname {
    font-size: clamp(28px, 5.6vw, 42px); font-weight: 800; color: #17233f;
    letter-spacing: .02em; min-height: 1.1em;
  }
  .console.reveal .num { animation: pop .55s cubic-bezier(.2,.9,.3,1.4); }
  @keyframes pop { 0%{transform:scale(.5)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }

  .win-tag {
    height: 20px; margin-bottom: 2px;
    font-size: 13px; font-weight: 800; letter-spacing: .28em; color: var(--amber-deep);
    opacity: 0; transition: opacity .3s;
  }
  .console.reveal .win-tag { opacity: 1; }

  .console-desc { color: #5c6b8a; font-size: 13.5px; font-weight: 700; line-height: 1.5; white-space: nowrap; }
  .console-sub  { margin-top: 8px; color: var(--muted); font-size: 13px; }

  .btn {
    margin-top: 24px; width: 100%;
    padding: 16px; border: none; border-radius: 15px; cursor: pointer;
    font-size: 17px; font-weight: 800; letter-spacing: .04em; color: #ffffff;
    background: linear-gradient(120deg, #3b7bff, #1f3f7a);
    box-shadow: 0 14px 30px rgba(47,109,240,.32);
    transition: transform .15s, box-shadow .2s, opacity .2s, filter .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 18px 38px rgba(47,109,240,.42); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .55; cursor: not-allowed; filter: grayscale(.2); transform: none; }

  .row { display: flex; gap: 10px; margin-top: 12px; }
  .btn.ghost {
    background: #ffffff; color: var(--muted);
    border: 1px solid rgba(31,63,122,.18); box-shadow: none;
    font-size: 14px; padding: 12px; flex: 0 0 auto; width: auto; margin-top: 0;
  }
  .btn.ghost:hover { color: var(--navy); border-color: rgba(31,63,122,.4); transform: none; box-shadow: none; }
  .meta { flex: 1; text-align: left; align-self: center; color: var(--muted); font-size: 13px; }
  .meta b { color: var(--blue); }

  /* 뽑은 번호 히스토리 */
  .history { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; min-height: 4px; }
  .history span {
    font-size: 13px; font-weight: 700; padding: 4px 11px; border-radius: 999px;
    color: var(--navy); background: rgba(47,109,240,.10); border: 1px solid rgba(47,109,240,.26);
  }
</style>
</head>

   ========================================================= */
const DURATION = 3000;   // 약 3초

const $ = id => document.getElementById(id);
const consoleEl = $('console'), numEl = $('num'), pnameEl = $('pname'), drawBtn = $('drawBtn'), resetBtn = $('resetBtn');
const remainEl = $('remain'), totalEl = $('total'), historyEl = $('history'), statState = $('statState'), cdesc = $('cdesc');

let pool = [];        // 남은 인원
const drawn = [];     // 뽑힌 인원
let drawing = false;

function buildPool(){ pool = PARTICIPANTS.slice(); }

function setStatus(text, on){
  if (!statState) return;
  statState.textContent = text;
  statState.classList.toggle('on', !!on);
}

function updateUI(){
  remainEl.textContent = pool.length;
  if (totalEl) totalEl.textContent = PARTICIPANTS.length;
  historyEl.innerHTML = drawn.map(p => `<span>${p.id} ${p.name}</span>`).join('');
}

function draw(){
  if (drawing) return;
  if (pool.length === 0){
    cdesc.textContent = '모든 인원 추첨이 끝났습니다. 초기화 후 다시 진행하세요.';
    return;
  }
  drawing = true;
  drawBtn.disabled = true;
  consoleEl.classList.remove('reveal');
  consoleEl.classList.add('drawing');
  setStatus('추첨 중…', true);
  cdesc.textContent = '추첨 중입니다…';

  // 빠르게 굴리기 (번호+이름 함께)
  const roll = setInterval(() => {
    const r = pool[Math.floor(Math.random()*pool.length)];
    numEl.textContent = r.id;
    pnameEl.textContent = r.name;
  }, 55);

  setTimeout(() => {
    clearInterval(roll);
    const idx = Math.floor(Math.random() * pool.length);
    const win = pool.splice(idx, 1)[0];
    drawn.push(win);

    numEl.textContent = win.id;
    pnameEl.textContent = win.name;
    consoleEl.classList.remove('drawing');
    consoleEl.classList.add('reveal');
    burst();
    updateUI();

    drawing = false;
    drawBtn.disabled = false;
    const done = pool.length === 0;
    setStatus(done ? '완료' : '대기', !done);
    drawBtn.textContent = done ? '🎯 추첨 완료' : '🎯 다시 추첨';
    cdesc.textContent = done
      ? '모든 인원 추첨이 끝났습니다. 초기화하면 다시 시작합니다.'
      : '사전 접수를 해주신 명단을 기준으로 추첨 됩니다.';
  }, DURATION);
}

function reset(){
  if (drawing) return;
  buildPool();
  drawn.length = 0;
  numEl.textContent = '?';
  pnameEl.innerHTML = '&nbsp;';
  consoleEl.classList.remove('reveal', 'drawing');
  setStatus('대기', true);
  drawBtn.textContent = '🎯 추첨 시작';
  cdesc.textContent = '사전 접수를 해주신 명단을 기준으로 추첨 됩니다.';
  updateUI();
}

drawBtn.addEventListener('click', draw);
resetBtn.addEventListener('click', reset);
buildPool(); updateUI();

/* ===== 배경 별 ===== */
const starC = $('stars'), sx = starC.getContext('2d');
let stars = [];
function initStars(){
  starC.width = innerWidth; starC.height = innerHeight;
  stars = Array.from({length: 130}, () => ({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*1.5 + .3, a: Math.random(), sp: Math.random()*.025 + .006
  }));
}
function drawStars(){
  sx.clearRect(0,0,starC.width,starC.height);
  for (const s of stars){
    s.a += s.sp; const o = (Math.sin(s.a)+1)/2;
    sx.beginPath(); sx.arc(s.x, s.y, s.r, 0, 7);
    sx.fillStyle = `rgba(47,109,240,${o*.35})`; sx.fill();
  }
  requestAnimationFrame(drawStars);
}
initStars(); drawStars();
addEventListener('resize', initStars);

/* ===== 컨페티 ===== */
const conf = $('confetti'), cx = conf.getContext('2d');
let pieces = [];
function sizeConf(){ conf.width = innerWidth; conf.height = innerHeight; }
sizeConf(); addEventListener('resize', sizeConf);
function burst(){
  const colors = ['#2f6df0','#f5a623','#ff5fa2','#22c3a6','#7c5cff','#ff8a3d'];
  // 카드(번호판) 위치에서 터지게
  const rect = (document.querySelector('.board') || consoleEl).getBoundingClientRect();
  const cxp = rect.left + rect.width/2;
  const cyp = rect.top + rect.height/2;
  for (let i = 0; i < 170; i++){
    pieces.push({
      x: cxp, y: cyp,
      vx: (Math.random()-.5)*15, vy: Math.random()*-15 - 4,
      g: .34 + Math.random()*.2,
      s: Math.random()*8 + 4, rot: Math.random()*360, vr: (Math.random()-.5)*22,
      c: colors[Math.floor(Math.random()*colors.length)], life: 130
    });
  }
}
function drawConf(){
  cx.clearRect(0,0,conf.width,conf.height);
  pieces = pieces.filter(p => p.life > 0);
  for (const p of pieces){
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
    cx.save(); cx.translate(p.x, p.y); cx.rotate(p.rot*Math.PI/180);
    cx.fillStyle = p.c; cx.globalAlpha = Math.min(1, p.life/45);
    cx.fillRect(-p.s/2, -p.s/2, p.s, p.s*.6);
    cx.restore();
  }
  requestAnimationFrame(drawConf);
}
drawConf();
