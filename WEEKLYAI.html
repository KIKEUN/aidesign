<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Design Weekly Card - Optimized View</title>
    <style>
        /* 1. 기본 레이아웃 - 배경색을 투명으로 설정 */
        body, html {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* [★건들지마3 - 초강력 은폐 강화판] */
        .pub-input {
            display: block !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
            opacity: 0 !important;
            filter: alpha(opacity=0) !important;
            z-index: -1000 !important;
            pointer-events: none !important;
        }

        /* [전체 컨테이너] */
        .main-container {
            position: relative;
            width: 100%;
            max-width: 600px; 
            margin: 20px auto;
            font-size: 0;
            line-height: 0;
            text-align: center;
            min-height: 500px; 
        }

        /* ----------------------------------------------------------------
           [상단 헤더 배너] 
        ----------------------------------------------------------------- */
        .weekly-header {
            width: 100%;
            max-width: 380px;
            margin: 0 auto 20px;
            text-align: left;
            padding: 0 4px;
            box-sizing: border-box;
            user-select: none;
        }

        .header-logo-text {
            font-size: 52px;
            font-weight: 900;
            color: #004b8d;
            line-height: 1.0; 
            margin-bottom: 4px; 
            letter-spacing: -2.5px;
            display: inline-block;
            text-transform: uppercase; 
        }

        .header-subtitle {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.4;
            /* [수정] 부제 아래 여백을 줄여 날짜를 위로 올림 */
            margin-bottom: 6px; 
            letter-spacing: -0.8px;
            word-break: keep-all;
        }

        /* 상단 날짜 및 푸터 텍스트 공통 스타일 */
        .meta-style {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: block;
            line-height: 1.6;
        }

        .header-divider {
            border: 0;
            border-top: 2.5px solid #1a1a1a;
            /* [수정] 날짜가 올라간 만큼 구분선과의 간격을 약간 확보 */
            margin: 12px 0 0 0;
        }

        /* ----------------------------------------------------------------
           [카드 뉴스 시스템] 본체
        ----------------------------------------------------------------- */
        .card-news-system {
            width: 100%;
            max-width: 380px; 
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
            opacity: 1;
        }

        .pub-wrapper {
            width: 100%;
            background-color: #fff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15);
            position: relative;
        }

        .content-area {
            position: relative;
            display: block; 
            width: 100%;
            min-height: 500px; 
        }

        .pub-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
            background-color: #fff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .pub-page img {
            width: 100%;
            height: auto;
            display: block;
            border: 0;
        }

        .pg1 { position: relative !important; }
        .home-link { position: absolute; top: 3.5%; right: 4.8%; width: 14%; height: 8%; z-index: 100; cursor: pointer; border-radius: 50%; }
        .bg-link { display: block; width: 100%; height: 100%; cursor: pointer; }

        /* ----------------------------------------------------------------
           [하단 푸터 영역] 
        ----------------------------------------------------------------- */
        .weekly-footer {
            width: 100%;
            max-width: 380px;
            margin: 24px auto 0;
            text-align: left;
            padding: 0 4px;
            box-sizing: border-box;
            user-select: none;
        }

        .footer-divider {
            border: 0;
            border-top: 2.5px solid #1a1a1a; 
            margin: 0 0 12px 0;
        }

        .footer-info {
            margin-bottom: 2px;
        }

        /* 메뉴 그리드 및 좌표 보정 */
        .menu-grid {
            position: absolute; top: 22.5%; left: 8.5%; width: 73%; height: 48%; 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 27px; pointer-events: none; z-index: 2;
        }
        .menu-item {
            width: 100%; aspect-ratio: 1 / 1; cursor: pointer; pointer-events: auto;
            background-image: url('https://kikeun.github.io/aidesign/ai52.png');
            background-size: 380px auto; background-repeat: no-repeat;
            border-radius: 30%; position: relative; --tx: 0px; --ty: 0px; --bx: 0px; --by: 0px;
            background-position: var(--bx) var(--by); transform: translate(var(--tx), var(--ty)) scale(1);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
        }
        .menu-item:hover { transform: translate(var(--tx), var(--ty)) scale(1.15); z-index: 10; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3)); }

        .menu-item:nth-child(4n+1) { --tx: 0px;    --bx: -32.3px; }      
        .menu-item:nth-child(4n+2) { --tx: -2.1px; --bx: -117.9px; }   
        .menu-item:nth-child(4n+3) { --tx: -4.2px; --bx: -203.5px; }   
        .menu-item:nth-child(4n)   { --tx: -6.3px; --bx: -289.0px; }     
        .menu-item:nth-child(-n+4) { --ty: 0px; --by: -152.0px; } 
        .menu-item:nth-child(n+5):nth-child(-n+8) { --ty: 45.4px; --by: -285.0px; } 
        .menu-item:nth-child(n+9):nth-child(-n+12) { --ty: 90.8px; --by: -418.4px; } 
        .menu-item:nth-child(n+13) { --ty: 135.4px; --by: -549.8px; } 
        .menu-item:nth-child(1) { --tx: 0.8px; } .menu-item:nth-child(2) { --tx: -1.3px; } .menu-item:nth-child(3) { --tx: -3.4px; } .menu-item:nth-child(4) { --tx: -5.5px; }
        .menu-item:nth-child(9)  { --tx: 0.8px; } .menu-item:nth-child(10) { --tx: -1.3px; } .menu-item:nth-child(11) { --tx: -3.4px; } .menu-item:nth-child(12) { --tx: -5.5px; }
        .menu-item:nth-child(4)  { --ty: -0.8px; } .menu-item:nth-child(8)  { --ty: 44.6px; } .menu-item:nth-child(12) { --ty: 90.0px; } .menu-item:nth-child(16) { --ty: 134.6px; }

        /* 페이지 전환 로직 */
        #page1:checked ~ .card-news-system .pub-wrapper .content-area .pg1, 
        #page2:checked ~ .card-news-system .pub-wrapper .content-area .pg2,
        #page3:checked ~ .card-news-system .pub-wrapper .content-area .pg3, 
        #page4:checked ~ .card-news-system .pub-wrapper .content-area .pg4,
        #page5:checked ~ .card-news-system .pub-wrapper .content-area .pg5, 
        #page6:checked ~ .card-news-system .pub-wrapper .content-area .pg6,
        #page7:checked ~ .card-news-system .pub-wrapper .content-area .pg7, 
        #page8:checked ~ .card-news-system .pub-wrapper .content-area .pg8,
        #page9:checked ~ .card-news-system .pub-wrapper .content-area .pg9, 
        #page10:checked ~ .card-news-system .pub-wrapper .content-area .pg10,
        #page11:checked ~ .card-news-system .pub-wrapper .content-area .pg11, 
        #page12:checked ~ .card-news-system .pub-wrapper .content-area .pg12,
        #page13:checked ~ .card-news-system .pub-wrapper .content-area .pg13, 
        #page14:checked ~ .card-news-system .pub-wrapper .content-area .pg14,
        #page15:checked ~ .card-news-system .pub-wrapper .content-area .pg15, 
        #page16:checked ~ .card-news-system .pub-wrapper .content-area .pg16,
        #page17:checked ~ .card-news-system .pub-wrapper .content-area .pg17, 
        #page18:checked ~ .card-news-system .pub-wrapper .content-area .pg18 {
            opacity: 1; z-index: 10; pointer-events: auto;
        }
    </style>
</head>

                            <label for="page15" class="menu-item"></label> <label for="page16" class="menu-item"></label> <label for="page17" class="menu-item"></label> <label for="page18" class="menu-item"></label>

                    <div class="pub-page pg6"><label for="page1" class="home-link"></label><label for="page2" class="bg-link"><img src="https://kikeun.github.io/aidesign/ai56.png" alt="C4"></label></div>
                    <div class="pub-page pg7"><label for="page1" class="home-link"></label><label for="page2" class="bg-link"><img src="https://kikeun.github.io/aidesign/ai57.png" alt="C5"></label></div>
