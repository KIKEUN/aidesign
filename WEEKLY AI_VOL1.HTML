    /* ✅ 기본 리셋 및 배경 고정 */
    html, body { margin:0; padding:0; background:#030303; color:#fff; width: 100%; height: auto; min-height: 100vh; overflow-x: hidden; }
    *, *::before, *::after { box-sizing:border-box; }

    /* [전체 컨테이너] */
    .bulletin-outer-container {
      width: 100%;
      height: auto; 
      position: relative;
      display: flex;
      justify-content: center; 
      align-items: flex-start; 
      padding-top: 30px; 
      padding-bottom: 30px; 
      font-family:'Pretendard', 'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
      background: #030303;
      overflow: hidden; 
    }

    /* ✅ 배경 추상 아이콘 */
    .bg-floating-icons {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .f-icon {
      position: absolute;
      opacity: 0.08; 
      filter: grayscale(100%) brightness(1.8);
      pointer-events: none;
      color: #fff;
    }

    @keyframes float-move {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 40px) rotate(180deg); }
      100% { transform: translate(-15px, 80px) rotate(360deg); }
    }

    /* ✅ 카드 영역 그룹 */
    .card-navigation-group {
      position: relative;
      z-index: 10;
      width: 400px;
      height: 710px;
    }

    /* ✅ 카드 본체 (모서리를 12px로 조정하여 직사각형 느낌 강조) */
    .ai-card-wrapper {
      position: relative;
      width: 400px;
      height: 710px;
      background: #181818;
      border-radius: 12px; 
      overflow:hidden;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      transform-origin: top center; 
    }

    .ai-nav-input { display:none !important; }

    /* ✅ 페이지 기본 스타일 */
    .ai-page {
      position:absolute;
      top:0; left:0; 
      width: 400px; 
      height: 710px;
      display:none !important; 
      background: #181818;
      animation: ai-fade .4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      border-radius: 12px;
    }

    @keyframes ai-fade { 
      from { opacity:0; transform: translateY(12px); filter: blur(3px); } 
      to { opacity:1; transform: translateY(0); filter: blur(0); } 
    }

    /* ✅ 탭 전환 로직 */
    #tab-cover:checked ~ .card-navigation-group .pg-cover,
    #tab-menu:checked ~ .card-navigation-group .pg-menu,
    #tab-1:checked ~ .card-navigation-group .pg-1, #tab-2:checked ~ .card-navigation-group .pg-2,
    #tab-3:checked ~ .card-navigation-group .pg-3, #tab-4:checked ~ .card-navigation-group .pg-4,
    #tab-5:checked ~ .card-navigation-group .pg-5, #tab-6:checked ~ .card-navigation-group .pg-6,
    #tab-7:checked ~ .card-navigation-group .pg-7, #tab-8:checked ~ .card-navigation-group .pg-8,

    .branding-banner {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200;
      background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.2);

    .btn-go-home {

<script>
  function rescaleCard() {
    const wrapper = document.getElementById('cardWrapper');
    const navGroup = document.getElementById('navGroup');
    const container = document.getElementById('mainContainer');
    
    const availableHeight = window.innerHeight * 0.92;
    const availableWidth = window.innerWidth * 0.95;
    
    let scale = availableHeight / 710;
    const maxWidthScale = availableWidth / 400;
    
    if (scale > maxWidthScale) scale = maxWidthScale;
    if (scale > 1.1) scale = 1.1; 
    
    wrapper.style.transform = `scale(${scale})`;
    
    const finalWidth = 400 * scale;
    const finalHeight = 710 * scale;
    
    navGroup.style.width = finalWidth + 'px';
    navGroup.style.height = finalHeight + 'px';
    
    container.style.height = (finalHeight + 60) + 'px'; 
  }

  window.addEventListener('resize', rescaleCard);
  window.addEventListener('load', rescaleCard);
  rescaleCard();
</script>
