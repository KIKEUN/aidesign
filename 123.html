<head>

  <style>
    /* ✅ 기본 리셋 + 전체 배경 이미지 */
    html, body {
      margin:0; padding:0;
      width:100%;
      min-height:100vh;
      overflow-x:hidden;
      color:#fff;
    }
    /* 포스터(ai97): 잘리지 않게 전체 표시 + 화면 정중앙 */
    html {
      background-color: #0a0a0a;
      background-image: url('https://kikeun.github.io/KIKEUN/ai97.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      /* contain과 함께 fixed는 일부 브라우저에서 어색할 수 있어 스크롤에 맞춤 */
      background-attachment: scroll;
    }
    body {
      background: transparent;
      min-height: 100vh;
    }
    *, *::before, *::after { box-sizing:border-box; }

    /* 상단 패딩↑ → 카드가 ai97 구분선(Weekly AI 아래 라인) 아래에 오도록 세로만 이동, 하단 40px 유지 */
    .bulletin-outer-container {
      width: 100%; min-height: 100vh; position: relative;
      display: flex; justify-content: center; align-items: center;
      padding: clamp(96px, 15vh, 200px) 0 40px;
      font-family:'Pretendard','Malgun Gothic',sans-serif;
      background: transparent; overflow: hidden;
      z-index: 0;
    }

    /* 배경 아이콘 */
    .bg-floating-icons { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .f-icon { position: absolute; opacity: 0.05; filter: brightness(2.5); pointer-events: none; color: #fff; }

    .card-navigation-group { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; overflow: visible; }

    /* transform:scale 레이아웃 보정 — 부모를 시각 크기(400×s, 710×s)로 두고 카드는 좌상단 기준 축소 */
    .card-scale-outer {
      position: relative;
      flex-shrink: 0;
      overflow: visible;
      width: 400px;
      height: 710px;
    }

    /* ✅ 카드 본체: 배경색 고정 및 그림자 제거 */
    .ai-card-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 710px;
      background-color: #181818 !important; border-radius: 38px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: none;
      transform-origin: top left;
    }

    .ai-nav-input { display:none !important; }

    /* ✅ 페이지 전환 애니메이션 */
    .ai-page {
      position:absolute; top:0; left:0; width: 400px; height: 710px;
      background-color: #181818;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease-in-out, visibility 0.4s;
      z-index: 1;
    }

    #tab-cover:checked ~ .card-navigation-group .pg-cover,
    #tab-menu:checked ~ .card-navigation-group .pg-menu,
    #tab-1:checked ~ .card-navigation-group .pg-1, #tab-2:checked ~ .card-navigation-group .pg-2,
    #tab-3:checked ~ .card-navigation-group .pg-3, #tab-4:checked ~ .card-navigation-group .pg-4,
    #tab-5:checked ~ .card-navigation-group .pg-5, #tab-6:checked ~ .card-navigation-group .pg-6,
    #tab-7:checked ~ .card-navigation-group .pg-7, #tab-8:checked ~ .card-navigation-group .pg-8,
    #tab-9:checked ~ .card-navigation-group .pg-9, #tab-10:checked ~ .card-navigation-group .pg-10,
    #tab-11:checked ~ .card-navigation-group .pg-11, #tab-12:checked ~ .card-navigation-group .pg-12,
    #tab-13:checked ~ .card-navigation-group .pg-13, #tab-14:checked ~ .card-navigation-group .pg-14,
    #tab-15:checked ~ .card-navigation-group .pg-15, #tab-16:checked ~ .card-navigation-group .pg-16 {
      opacity: 1;
      visibility: visible;
      z-index: 5;
    }

    .branding-banner {
      position: absolute; top: 22px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 5px 14px; border-radius: 20px; font-size: 9px; font-weight: 800; color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.1em;
    }
    .btn-go-home {
      position: absolute; top: 20px; right: 20px; z-index: 120; width: 38px; height: 38px;
      background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
    }

    .visual-area {
      position: absolute; top: 0; left: 0; width: 400px; height: 400px;
      z-index: 1; background-color: #181818;
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }

    .visual-area-overlay {
      position: absolute; top: 0; left: 0; width: 400px; height: 401px; 
      background: linear-gradient(to bottom, 
        rgba(24,24,24,0) 0%, 
        rgba(24,24,24,0) 20%, 
        rgba(24,24,24,0.05) 35%, 
        rgba(24,24,24,0.2) 50%, 
        rgba(24,24,24,0.55) 70%, 
        rgba(24,24,24,0.85) 85%, 
        rgba(24,24,24,1) 92%,

      z-index: 5; pointer-events: none;
    }

    .ai-app-icon { position: absolute; top: 445px; left: 30px; width: 64px; height: 64px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.25); overflow:hidden; background:#222; z-index: 20;}
    .ai-app-icon img { width:100%; height:100%; object-fit:cover; display:block; }
    .ai-title-text { position: absolute; top: 460px; left: 110px; font-size:30px; font-weight:900; z-index: 20;}

    .ai-subtitle { position: absolute; top: 520px; left: 35px; width: 340px; font-size:16px; font-weight: 600; color:rgba(255,255,255,0.85); line-height:1.4; z-index: 20;}
    .brief-points { position: absolute; top: 570px; left: 35px; width: 340px; z-index: 20;}
    .point-item { font-size: 14px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; color: #fff; }
    .point-dot { width:7px; height:7px; border-radius:50%; flex-shrink: 0; }
    
    /* ✅ 상세 카드 하단 문구 크기 조절 (9px -> 11px) */
    .page-footer { 
      position:absolute; bottom:25px; width:100%; text-align:center; 
      font-size:11px; font-weight:900; color: rgba(255,255,255,0.25); 
      letter-spacing:2px; z-index: 20; 
    }

    .badge-doc { color:#60a5fa; background:rgba(96,165,250,0.15); border:1px solid rgba(96,165,250,0.5); }
    .badge-auto { color:#c084fc; background:rgba(192,132,252,0.15); border:1px solid rgba(192,132,252,0.5); }
    .badge-img  { color:#fbbf24; background:rgba(251,191,36,0.15); border:1px solid rgba(251,191,36,0.5); }
    .badge-video{ color:#fb7185; background:rgba(251,113,133,0.15); border:1px solid rgba(251,113,133,0.5); }

    .back-to-menu-label { display:block; width:100%; height:100%; position:absolute; top:0; left:0; cursor:pointer; z-index:50; }

    /* 메뉴 허브 스타일 */
    .menu-title-fixed { position: absolute; top: 55px; left: 25px; font-size: 21px; font-weight: 900; }
    .menu-subtitle-fixed { position: absolute; top: 88px; left: 25px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.4); }
    
    .cat-title { font-weight: 900; font-size: 13px; margin-bottom: 12px; }
    .cat-line { height: 1px; width: 350px; margin-top: -8px; margin-bottom: 12px; opacity: 0.4; }
    
    .hub-item { 
      cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 82px; 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

    .hub-icon-sm { 
      width: 64px; height: 64px; border-radius: 16px; background: #252525;

      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .hub-icon-sm img { width: 100%; height: 100%; object-fit: cover; }
    .hub-name-sm { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); text-align: center; }

    /* 어플 아이콘 호버 효과 */
    .hub-item:hover { transform: translateY(-5px); }
    .hub-item:hover .hub-icon-sm { 
      transform: scale(1.15); 
      border-color: rgba(255,255,255,0.5);

    /* 표지(Cover) 스타일 */
    .pg-cover { background: #121212; cursor: pointer; }
    .cover-top-info { position: absolute; top: 110px; left: 45px; z-index: 10; }

    .cover-desc-line { position: absolute; top: 450px; left: 45px; font-size: 22px; font-weight: 800; z-index: 10; }
    .cover-highlight { font-size: 38px; color: #60a5fa; display: block; margin-top: 6px; }
  </style>
</head>

  <script>
    let currentScale = 1;

    function rescaleCard() {
      const outer = document.getElementById('cardScaleOuter');
      const wrapper = document.getElementById('cardWrapper');
      const h = window.innerHeight * 0.80;
      const w = window.innerWidth * 0.95;
      /* 균등 축소: 레이아웃 박스는 outer에만 적용(가로 클리핑 방지) */
      currentScale = Math.min(h / 710, w / 400, 0.93);
      outer.style.width = (400 * currentScale) + 'px';
      outer.style.height = (710 * currentScale) + 'px';
      wrapper.style.transform = `scale(${currentScale})`;
    }

    window.addEventListener('resize', rescaleCard);
    window.addEventListener('load', rescaleCard);
    rescaleCard();
  </script>
